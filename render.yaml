services:
  - type: web
    name: zy-board-game-server
    runtime: node
    buildCommand: npm ci && npm run build --workspace server
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CLIENT_ORIGIN
        sync: false
